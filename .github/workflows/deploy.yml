name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_MSAL_TENANT_ID: ${{ secrets.VITE_MSAL_TENANT_ID }}
          VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID }}
          VITE_SP_SITE_ID: ${{ secrets.VITE_SP_SITE_ID }}
          VITE_SP_LIST_CUSTOMERS: ${{ secrets.VITE_SP_LIST_CUSTOMERS }}
          VITE_SP_LIST_SYSTEMS: ${{ secrets.VITE_SP_LIST_SYSTEMS }}
          VITE_SP_LIST_WORKTYPES: ${{ secrets.VITE_SP_LIST_WORKTYPES }}
          VITE_SP_LIST_REPORTS: ${{ secrets.VITE_SP_LIST_REPORTS }}
          VITE_SP_LIST_PLANS: ${{ secrets.VITE_SP_LIST_PLANS }}
          VITE_APP_BASE_PATH: ${{ secrets.VITE_APP_BASE_PATH }}
      - name: Configure custom domain (optional)
        env:
          GH_PAGES_CUSTOM_DOMAIN: ${{ secrets.GH_PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ -n "$GH_PAGES_CUSTOM_DOMAIN" ]; then
            echo "$GH_PAGES_CUSTOM_DOMAIN" > dist/CNAME
          fi
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
